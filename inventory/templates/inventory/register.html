<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShelf | Staff Registration</title>
    <style>
        /* Unified Theme Palette */
        :root {
            --primary-gradient: linear-gradient(rgba(26, 37, 47, 0.85), rgba(26, 37, 47, 0.85));
            --accent: #3498db;
            --success: #2ecc71;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.98);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            /* Consistent Background Image */
            background: var(--primary-gradient), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Registration Card with Glassmorphism */
        .register-container {
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 480px;
            margin: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            color: var(--text-main);
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 8px;
        }

        /* Django Form Styling */
        form p {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], 
        input[type="password"], 
        select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: #f8fafc;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus, select:focus {
            border-color: var(--accent);
            background-color: #ffffff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
        }

        /* Role Selection Box */
        .role-section {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid var(--accent);
            margin: 25px 0;
        }

        .role-section label {
            color: var(--accent);
        }

        /* High-Visibility Button */
        .btn-register {
            width: 100%;
            padding: 16px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-register:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(46, 204, 113, 0.4);
        }

        .helptext {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: block;
            margin-top: 6px;
            line-height: 1.4;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="header">
            <h1>Create Account</h1>
            <p>Onboard New SmartShelf Personnel</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            {{ form.as_p }}

            <div class="role-section">
                <label for="role">Assign Security Role</label>
                <select name="role" id="role" required>
                    <option value="staff">Staff (Standard Inventory Access)</option>
                    <option value="admin">Admin (Full System Oversight)</option>
                </select>
                <small class="helptext">Caution: Admins can modify financial data and manage other user credentials.</small>
            </div>

            <button type="submit" class="btn-register">Complete Registration</button>
        </form>

        <div class="footer">
            <a href="{% url 'custom_admin' %}">← Return to Oversight Panel</a>
        </div>
    </div>

</body>
</html>
